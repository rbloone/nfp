<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Neste Latvia fuel price tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f6f7f9; color: #1f2328; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .card { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 2px 14px rgba(0,0,0,.06); }
    h1 { margin-top: 0; }
    .muted { color: #5d6773; }
    .error { color: #b42318; white-space: pre-wrap; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
    th, td { padding: 10px 8px; border-bottom: 1px solid #eaecef; text-align: left; }
    .small { font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Neste Latvia fuel price tracker</h1>
      <p class="muted">Daily prices from <a href="https://www.neste.lv/lv/content/degvielas-cenas">neste.lv</a></p>
      <p id="status" class="small muted">Loading data…</p>
      <p id="error" class="error"></p>
      <canvas id="chart" height="110"></canvas>
      <table id="latestTable" hidden>
        <thead>
          <tr><th>Product</th><th>Latest price (EUR/L)</th><th>Latest date</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      const headers = lines[0].split(',');
      return lines.slice(1).map(line => {
        const cols = line.split(',');
        const row = {};
        headers.forEach((h, i) => row[h] = cols[i]);
        return row;
      });
    }

    async function loadData() {
      const status = document.getElementById('status');
      const error = document.getElementById('error');

      try {
        const response = await fetch(`./data/fuel_prices.csv?v=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const text = await response.text();
        if (!text.trim()) {
          throw new Error('CSV is empty');
        }

        const rows = parseCSV(text);
        if (!rows.length) {
          throw new Error('No rows found in CSV');
        }

        const byProduct = new Map();
        for (const row of rows) {
          const product = row.product;
          const price = Number(row.price_eur_per_l);
          const d = row.date;
          if (!byProduct.has(product)) byProduct.set(product, []);
          byProduct.get(product).push({ x: d, y: price });
        }

        for (const points of byProduct.values()) {
          points.sort((a, b) => a.x.localeCompare(b.x));
        }

        const datasets = Array.from(byProduct.entries()).map(([label, data]) => ({ label, data }));

        const ctx = document.getElementById('chart').getContext('2d');
        new Chart(ctx, {
          type: 'line',
          data: { datasets },
          options: {
            responsive: true,
            parsing: false,
            interaction: { mode: 'nearest', intersect: false },
            scales: {
              x: { type: 'category', title: { display: true, text: 'Date' } },
              y: { title: { display: true, text: 'EUR/L' } }
            }
          }
        });

        const tbody = document.querySelector('#latestTable tbody');
        const latestRows = Array.from(byProduct.entries()).map(([product, data]) => {
          const last = data[data.length - 1];
          return { product, price: last.y.toFixed(3), date: last.x };
        }).sort((a, b) => a.product.localeCompare(b.product));

        for (const row of latestRows) {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${row.product}</td><td>${row.price}</td><td>${row.date}</td>`;
          tbody.appendChild(tr);
        }
        document.getElementById('latestTable').hidden = false;
        status.textContent = `Loaded ${rows.length} rows.`;
      } catch (e) {
        error.textContent = `Failed to load data: ${e.message}`;
        status.textContent = 'Could not render chart.';
      }
    }

    loadData();
  </script>
</body>
</html>
