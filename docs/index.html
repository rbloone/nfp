<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neste Latvia Fuel Price Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f7f7f7; color: #111; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
    h1 { margin-top: 0; }
    .meta { color: #555; margin-bottom: 16px; }
    #chartWrap { height: 520px; }
    table { width: 100%; border-collapse: collapse; margin-top: 24px; background: white; border-radius: 12px; overflow: hidden; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; }
    th { background: #fafafa; }
    .small { font-size: 14px; color: #666; }
    a { color: inherit; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Neste Latvia fuel price tracker</h1>
      <div class="meta">
        Daily prices scraped from <a href="https://www.neste.lv/lv/content/degvielas-cenas">neste.lv</a>
      </div>
      <div id="chartWrap">
        <canvas id="priceChart"></canvas>
      </div>
      <p class="small" id="status">Loading data…</p>
    </div>

    <table id="latestTable">
      <thead>
        <tr>
          <th>Product</th>
          <th>Latest price (EUR/l)</th>
          <th>Latest date</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    async function loadCsv() {
      const res = await fetch('./data/fuel_prices.csv');
      if (!res.ok) throw new Error('Could not load CSV');
      return await res.text();
    }

    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/);
      const headers = lines.shift().split(',');
      return lines.map(line => {
        const cols = line.split(',');
        const row = {};
        headers.forEach((h, i) => row[h] = cols[i]);
        return row;
      });
    }

    function groupByProduct(rows) {
      const map = new Map();
      for (const row of rows) {
        if (!map.has(row.product)) map.set(row.product, []);
        map.get(row.product).push(row);
      }
      for (const arr of map.values()) {
        arr.sort((a, b) => a.date.localeCompare(b.date));
      }
      return map;
    }

    function renderTable(grouped) {
      const tbody = document.querySelector('#latestTable tbody');
      tbody.innerHTML = '';
      [...grouped.entries()].forEach(([product, rows]) => {
        const last = rows[rows.length - 1];
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${product}</td>
          <td>${Number(last.price_eur_per_l).toFixed(3)}</td>
          <td>${last.date}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function main() {
      const text = await loadCsv();
      const rows = parseCsv(text);
      if (!rows.length) {
        document.getElementById('status').textContent = 'CSV is present but has no data rows yet.';
        return;
      }
      const grouped = groupByProduct(rows);

      const datasets = [...grouped.entries()].map(([product, entries]) => ({
        label: product,
        data: entries.map(r => ({ x: r.date, y: Number(r.price_eur_per_l) })),
        tension: 0.2
      }));

      const ctx = document.getElementById('priceChart');
      new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
          parsing: false,
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'nearest', intersect: false },
          scales: {
            x: { type: 'category', title: { display: true, text: 'Date' } },
            y: { title: { display: true, text: 'EUR/l' } }
          }
        }
      });

      renderTable(grouped);

      const dates = rows.map(r => r.date).sort();
      const latestDate = dates[dates.length - 1];
      document.getElementById('status').textContent =
        `Loaded ${rows.length} rows across ${grouped.size} products. Latest date: ${latestDate}`;
    }

    main().catch(err => {
      document.getElementById('status').textContent = 'Failed to load data: ' + err.message;
      console.error(err);
    });
  </script>
</body>
</html>
